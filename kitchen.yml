---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  deprecations_as_errors: true
  chef_license: accept-no-persist

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

verifier:
  name: inspec

suites:
  - name: auto-master
    run_list:
      - recipe[test::kitchen_sudoers]
      - recipe[test::auto_master]
  - name: map-entry
    run_list:
      - recipe[test::kitchen_sudoers]
      - recipe[test::map_entry]
  - name: multi
    run_list:
      - recipe[test::kitchen_sudoers]
      - recipe[test::multi]
  - name: nfs
    run_list:
      - recipe[test::kitchen_sudoers]
      - recipe[test::nfs]
